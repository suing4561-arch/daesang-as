<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대상정보통신 AS 관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#f7f5f0;--panel:#fff;--navy:#1a2744;--navy2:#243358;--gold:#c8922a;--gold2:#e8b04a;--text:#1a2744;--muted:#6b7280;--line:#e5ddd0;--red:#dc2626;--green:#16a34a;--shadow:0 4px 24px rgba(26,39,68,.10);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.site-header{background:var(--navy);border-bottom:3px solid var(--gold);padding:0 28px;height:54px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;}
.site-logo{font-size:19px;font-weight:900;color:#fff;}
.site-logo span{color:var(--gold);}
.site-sub{font-size:11px;color:rgba(255,255,255,.4);}
.tab-bar{background:var(--navy2);display:flex;padding:0 28px;}
.tab-btn{padding:12px 22px;font-size:13px;font-weight:700;color:rgba(255,255,255,.5);border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;font-family:'Noto Sans KR',sans-serif;transition:.2s;}
.tab-btn.active{color:#fff;border-bottom-color:var(--gold);}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.container{max-width:1000px;margin:0 auto;padding:22px 16px 60px;}
.card{background:var(--panel);border-radius:12px;box-shadow:var(--shadow);border:1px solid var(--line);padding:18px;margin-bottom:14px;}
.card-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:10px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.3px;}
.form-input{border:1.5px solid var(--line);border-radius:7px;padding:8px 10px;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:#1a2744;background:#fff;outline:none;transition:.15s;}
.form-input:focus{border-color:var(--gold);}
.form-textarea{resize:vertical;min-height:72px;}
.btn{padding:8px 16px;border-radius:8px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px;}
.btn-navy{background:var(--navy);color:#fff;}
.btn-gold{background:var(--gold);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--line);color:var(--muted);}
.btn-outline:hover{border-color:var(--navy);color:var(--navy);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}

/* 제품 테이블 */
.ptable{width:100%;border-collapse:collapse;margin-bottom:8px;}
.ptable th{background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:8px 8px;text-align:left;}
.ptable td{padding:4px 4px;border-bottom:1px solid var(--line);vertical-align:middle;}
.ptable tr:last-child td{border-bottom:none;}
.pinput{width:100%;border:1.5px solid var(--line);border-radius:5px;padding:5px 7px;font-family:'Noto Sans KR',sans-serif;font-size:13px;color:#1a2744;background:#fff;font-weight:500;}
.pinput:focus{outline:none;border-color:var(--gold);}
.pinput::placeholder{color:#aaa;}
.del-btn{width:26px;height:26px;border:1px solid var(--line);border-radius:5px;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;}
.del-btn:hover{background:#fee2e2;border-color:var(--red);color:var(--red);}

/* 수리 목록 */
.repair-list{display:flex;flex-direction:column;gap:7px;}
.repair-item{background:var(--panel);border:1.5px solid var(--line);border-radius:9px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.repair-item.received{border-color:var(--green);background:#f0fff4;}
.ri-info{flex:1;min-width:0;}
.ri-main{font-size:14px;font-weight:700;}
.ri-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.ri-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(200,146,42,.12);color:var(--gold);white-space:nowrap;}
.ri-badge.done{background:rgba(22,163,74,.12);color:var(--green);}
.ri-actions{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.filter-bar input,.filter-bar select{padding:7px 10px;border:1.5px solid var(--line);border-radius:7px;font-family:'Noto Sans KR',sans-serif;font-size:13px;outline:none;background:var(--panel);color:#1a2744;}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--gold);}

/* 합계 */
.est-sum{background:#f8f5f0;border-radius:9px;padding:12px 14px;margin-top:10px;}
.est-row{display:flex;justify-content:space-between;font-size:14px;padding:3px 0;}
.est-row.total{font-size:16px;font-weight:900;color:var(--navy);border-top:1.5px solid var(--line);margin-top:6px;padding-top:9px;}
.est-val{font-family:'DM Mono',monospace;font-weight:700;}

/* 공급자 박스 */
.sup-box{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:13px;}
.sup-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:11px;}

/* 토스트 */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--navy);color:#fff;padding:10px 18px;border-radius:100px;font-size:13px;font-weight:700;opacity:0;transition:.3s;z-index:400;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* 인쇄 */
#printArea{display:none;}
@media print{
  body>*{display:none!important;}
  #printArea{display:block!important;font-family:'맑은 고딕','Noto Sans KR',sans-serif;font-size:9pt;color:#000;}
  @page{size:A4;margin:14mm 12mm;}
}
.pc{font-family:'맑은 고딕','Noto Sans KR',sans-serif;font-size:10pt;color:#000;}
.pc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.pc-title{text-align:center;flex:1;font-size:24pt;font-weight:900;letter-spacing:10px;}
.pc-logo{border:2px solid #111;padding:4px 8px;font-weight:900;font-size:17pt;letter-spacing:-1px;}
.pc table{width:100%;border-collapse:collapse;margin-top:8px;font-size:9.5pt;}
.pc th,.pc td{border:1px solid #111;padding:6px 7px;height:28px;vertical-align:middle;}
.pc th{background:#f0f0f0;text-align:center;font-weight:700;}
.pc .lbl{background:#f7f7f7;font-weight:700;text-align:center;width:16%;white-space:nowrap;}
.pc .sec{background:#e8e8e8;font-weight:700;text-align:center;}
.pc .r{text-align:right;}
.pc .c{text-align:center;}
.pc .total-row td{font-size:13pt;font-weight:900;}
.pc .note-td{height:100px;vertical-align:top;line-height:1.8;}
.pc .small{font-size:8pt;color:#444;margin-top:10px;}
</style>
</head>
<body>

<header class="site-header">
  <div class="site-logo">대상<span>정보통신</span></div>
  <div class="site-sub">AS 관리 시스템</div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('estimate',this)">📋 견적서</button>
  <button class="tab-btn" onclick="switchTab('repair',this)">🔧 수리의뢰서</button>
</div>

<!-- ══ 탭1: 견적서 ══ -->
<div id="tab-estimate" class="tab-panel active">
<div class="container">

  <!-- 공급자 정보 (접기/펼치기) -->
  <div class="sup-box">
    <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="toggleSupplier()">
      <span style="font-size:13px;font-weight:700;color:var(--navy);">⚙️ 공급자 정보
        <span style="font-size:11px;color:var(--muted);font-weight:400;" id="supHint">(클릭하여 펼치기)</span>
      </span>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-navy btn-sm" onclick="event.stopPropagation();saveSupplier()">💾 저장</button>
        <span id="supArrow" style="color:var(--muted);">▼</span>
      </div>
    </div>
    <div id="supBody" style="display:none;">
      <div class="sup-grid" style="margin-top:11px;">
        <div class="form-group"><label class="form-label">상호명</label><input class="form-input" id="sup_name" value="대상정보통신"></div>
        <div class="form-group"><label class="form-label">사업자번호</label><input class="form-input" id="sup_bizno" value="607-10-86981"></div>
        <div class="form-group"><label class="form-label">대표자</label><input class="form-input" id="sup_ceo" value="김진선"></div>
        <div class="form-group"><label class="form-label">연락처</label><input class="form-input" id="sup_tel" value="010-4551-7240"></div>
        <div class="form-group" style="grid-column:1/-1;"><label class="form-label">주소</label><input class="form-input" id="sup_addr" value="부산시 남구 동명로 146번길 123"></div>
        <div class="form-group" style="grid-column:1/-1;"><label class="form-label">업태/종목</label><input class="form-input" id="sup_biz" value="도소매 / POS, CCTV, 전자계약"></div>
        <div class="form-group"><label class="form-label">은행명</label><input class="form-input" id="sup_bank" placeholder="예) 국민은행"></div>
        <div class="form-group"><label class="form-label">계좌번호 / 예금주</label><input class="form-input" id="sup_account" placeholder="000-00-000000 / 홍길동"></div>
      </div>
    </div>
  </div>

  <!-- 견적서 작성 -->
  <div class="card">
    <div class="card-title" style="justify-content:space-between;">
      <span>📋 견적서 작성</span>
      <div style="display:flex;gap:12px;align-items:center;">
        <label style="font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;cursor:pointer;">
          <input type="radio" name="vatMode" value="exclude" checked onchange="calcEstimate()"> 부가세 별도
        </label>
        <label style="font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;cursor:pointer;">
          <input type="radio" name="vatMode" value="include" onchange="calcEstimate()"> 부가세 포함
        </label>
      </div>
    </div>

    <!-- 수신자 -->
    <div class="form-grid" style="margin-bottom:14px;">
      <div class="form-group">
        <label class="form-label">견적번호</label>
        <input class="form-input" id="e_no" placeholder="DS-2026-001">
      </div>
      <div class="form-group">
        <label class="form-label">견적일자 *</label>
        <input class="form-input" type="date" id="e_date">
      </div>
      <div class="form-group">
        <label class="form-label">수신 (가맹점명) *</label>
        <input class="form-input" id="e_client" placeholder="상호명">
      </div>
      <div class="form-group">
        <label class="form-label">담당자</label>
        <input class="form-input" id="e_manager" placeholder="담당자명">
      </div>
      <div class="form-group">
        <label class="form-label">연락처</label>
        <input class="form-input" id="e_clienttel" placeholder="000-0000-0000">
      </div>
      <div class="form-group">
        <label class="form-label">유효기간</label>
        <input class="form-input" id="e_valid" placeholder="견적일로부터 30일">
      </div>
      <div class="form-group">
        <label class="form-label">설치 예정일</label>
        <input class="form-input" id="e_install" placeholder="계약 후 ○일 이내">
      </div>
      <div class="form-group">
        <label class="form-label">결제 조건</label>
        <input class="form-input" id="e_payment" placeholder="설치 완료 후 당일 결제">
      </div>
    </div>

    <!-- 품목 -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">
      <span style="font-size:12px;font-weight:700;color:var(--muted);">견적 내역</span>
      <button class="btn btn-outline btn-sm" onclick="addEstimateRow()">+ 행 추가</button>
    </div>
    <table class="ptable" id="estimateTable">
      <thead><tr>
        <th style="width:22%">품명</th>
        <th>규격 / 내용</th>
        <th style="width:8%">수량</th>
        <th style="width:13%">단가</th>
        <th style="width:13%">금액</th>
        <th style="width:32px"></th>
      </tr></thead>
      <tbody id="estimateBody"></tbody>
    </table>

    <!-- 합계 -->
    <div class="est-sum">
      <div class="est-row"><span>공급가액</span><span class="est-val" id="sumSupply">0원</span></div>
      <div class="est-row"><span>부가세 (10%)</span><span class="est-val" id="sumVat">0원</span></div>
      <div class="est-row total"><span>합계</span><span class="est-val" id="sumTotal">0원</span></div>
    </div>

    <!-- A/S 조건 / 특이사항 -->
    <div class="form-grid" style="margin-top:12px;">
      <div class="form-group">
        <label class="form-label">A/S 조건</label>
        <input class="form-input" id="e_as" value="설치일 기준 1년 무상 (고객 과실 제외)">
      </div>
      <div class="form-group full">
        <label class="form-label">특이사항</label>
        <textarea class="form-input form-textarea" id="e_note" placeholder="- 현장 상황에 따라 추가 비용이 발생할 수 있습니다.&#10;- 추가 배선, 천장 타공, 구조 변경 공사는 별도 견적입니다."></textarea>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-gold" onclick="printEstimate()">🖨️ 견적서 출력</button>
      <button class="btn btn-outline" onclick="clearEstimateForm()">초기화</button>
    </div>
  </div>
</div>
</div>

<!-- ══ 탭2: 수리의뢰서 ══ -->
<div id="tab-repair" class="tab-panel">
<div class="container">

  <div class="card">
    <div class="card-title">🔧 수리의뢰서 작성</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">출고일자 *</label>
        <input class="form-input" type="date" id="r_outDate">
      </div>
      <div class="form-group">
        <label class="form-label">입고날짜</label>
        <input class="form-input" type="date" id="r_inDate">
      </div>
      <div class="form-group">
        <label class="form-label">입고 가맹점명 (내부용)</label>
        <input class="form-input" id="r_storeName" placeholder="가맹점명">
      </div>
      <div class="form-group">
        <label class="form-label">연락처</label>
        <input class="form-input" id="r_tel" placeholder="010-0000-0000">
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin:12px 0 7px;">
      <span style="font-size:12px;font-weight:700;color:var(--muted);">제품 목록</span>
      <button class="btn btn-outline btn-sm" onclick="addProductRow()">+ 행 추가</button>
    </div>
    <table class="ptable">
      <thead><tr>
        <th style="width:20%">모델명</th>
        <th style="width:25%">제품번호</th>
        <th>불량내역</th>
        <th style="width:32px"></th>
      </tr></thead>
      <tbody id="productBody"></tbody>
    </table>

    <div class="btn-row">
      <button class="btn btn-navy" onclick="saveRepair()" id="repairSaveBtn">💾 저장</button>
      <button class="btn btn-outline" onclick="cancelRepairEdit()" id="repairCancelEditBtn" style="display:none;">수정 취소</button>
      <button class="btn btn-gold" onclick="printRepair()">🖨️ 수리의뢰서 출력</button>
      <button class="btn btn-outline" onclick="clearRepairForm()">초기화</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📋 수리의뢰 목록</div>
    <div class="filter-bar">
      <input type="text" id="searchKw" placeholder="가맹점·모델명 검색" oninput="renderRepairList()">
      <select id="filterSt" onchange="renderRepairList()">
        <option value="">전체</option>
        <option value="pending">입고 대기</option>
        <option value="received">입고 완료</option>
      </select>
      <button class="btn btn-outline btn-sm" onclick="exportExcel()">📥 엑셀</button>
    </div>
    <div class="repair-list" id="repairList">
      <div style="text-align:center;padding:32px;color:var(--muted);">저장된 수리의뢰서가 없습니다.</div>
    </div>
  </div>
</div>
</div>

<div id="printArea"></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyCtcpBNr9lSwVSCI9xiJUb947n4gUPzR2c",
  authDomain:"daesang-as.firebaseapp.com",
  databaseURL:"https://daesang-as-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"daesang-as",
  storageBucket:"daesang-as.firebasestorage.app",
  messagingSenderId:"1003933998008",
  appId:"1:1003933998008:web:cfd41be7aa36fada564d4d"
});
const db = firebase.database();
let repairs = [], toastTimer = null, editingRepairId = null;

// ── 공통 ──
function switchTab(name, el) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  el.classList.add('active');
}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2800);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── 공급자 ──
function toggleSupplier(){
  const body=document.getElementById('supBody');
  const open=body.style.display==='block';
  body.style.display=open?'none':'block';
  document.getElementById('supArrow').textContent=open?'▼':'▲';
  document.getElementById('supHint').textContent=open?'(클릭하여 펼치기)':'(클릭하여 접기)';
}
function getSupplier(){
  return {
    name:    document.getElementById('sup_name')?.value    ||'대상정보통신',
    bizno:   document.getElementById('sup_bizno')?.value   ||'607-10-86981',
    ceo:     document.getElementById('sup_ceo')?.value     ||'김진선',
    tel:     document.getElementById('sup_tel')?.value     ||'010-4551-7240',
    addr:    document.getElementById('sup_addr')?.value    ||'',
    biz:     document.getElementById('sup_biz')?.value     ||'',
    bank:    document.getElementById('sup_bank')?.value    ||'',
    account: document.getElementById('sup_account')?.value ||'',
  };
}
async function saveSupplier(){
  try{await db.ref('settings/supplier').set(getSupplier());showToast('✅ 공급자 정보 저장됨');}
  catch(e){showToast('❌ 저장 실패');}
}
async function loadSupplier(){
  try{
    const snap=await db.ref('settings/supplier').once('value');
    const s=snap.val(); if(!s) return;
    ['name','bizno','ceo','tel','addr','biz','bank','account'].forEach(k=>{
      const el=document.getElementById('sup_'+k); if(el&&s[k])el.value=s[k];
    });
  }catch(e){}
}

// ── 견적서 ──
function addEstimateRow(name='',spec='',qty=1,price=0){
  const tbody=document.getElementById('estimateBody');
  const tr=document.createElement('tr');
  const uid='e'+Date.now()+Math.random().toString(36).slice(2);
  tr.dataset.uid=uid;
  tr.innerHTML=`
    <td><input class="pinput" placeholder="품명" value="${esc(name)}" oninput="calcEstimate()"></td>
    <td><input class="pinput" placeholder="규격/내용" value="${esc(spec)}" oninput="calcEstimate()"></td>
    <td><input class="pinput" type="number" min="1" value="${qty}" style="text-align:center" oninput="calcEstimate()"></td>
    <td><input class="pinput" type="number" min="0" value="${price||''}" placeholder="0" style="text-align:right" oninput="calcEstimate()"></td>
    <td><input class="pinput" readonly style="background:#f4f4f4;text-align:right;color:#555;" id="amt-${uid}"></td>
    <td><button class="del-btn" onclick="this.closest('tr').remove();calcEstimate()">🗑</button></td>`;
  tbody.appendChild(tr);
  calcEstimate();
}
function calcEstimate(){
  const vatMode=document.querySelector('input[name="vatMode"]:checked')?.value||'exclude';
  let total=0;
  document.querySelectorAll('#estimateBody tr').forEach(tr=>{
    const ins=tr.querySelectorAll('input');
    const qty=Number(ins[2]?.value)||0, price=Number(ins[3]?.value)||0, amt=qty*price;
    const amtEl=tr.querySelector('[id^="amt-"]');
    if(amtEl) amtEl.value=amt?amt.toLocaleString()+'원':'';
    total+=amt;
  });
  let supply,vat,grand;
  if(vatMode==='include'){vat=Math.round(total/11);supply=total-vat;grand=total;}
  else{supply=total;vat=Math.round(total*.1);grand=total+vat;}
  document.getElementById('sumSupply').textContent=supply.toLocaleString()+'원';
  document.getElementById('sumVat').textContent=vat.toLocaleString()+'원';
  document.getElementById('sumTotal').textContent=grand.toLocaleString()+'원';
}
function clearEstimateForm(){
  ['e_no','e_client','e_manager','e_clienttel','e_valid','e_install','e_payment','e_as','e_note'].forEach(id=>{
    const el=document.getElementById(id); if(el)el.value='';
  });
  document.getElementById('e_date').value=new Date().toISOString().split('T')[0];
  document.getElementById('e_valid').value='견적일로부터 30일';
  document.getElementById('e_install').value='계약 후 ○일 이내';
  document.getElementById('e_payment').value='설치 완료 후 당일 결제';
  document.getElementById('e_as').value='설치일 기준 1년 무상 (고객 과실 제외)';
  document.getElementById('estimateBody').innerHTML='';
  for(let i=0;i<4;i++) addEstimateRow();
  calcEstimate();
}
function getItems(){
  return Array.from(document.querySelectorAll('#estimateBody tr')).map(tr=>{
    const ins=tr.querySelectorAll('input');
    return{name:ins[0]?.value||'',spec:ins[1]?.value||'',qty:Number(ins[2]?.value)||0,price:Number(ins[3]?.value)||0};
  });
}

// ── 수리의뢰서 ──
function addProductRow(model='',serial='',defect=''){
  const tbody=document.getElementById('productBody');
  const tr=document.createElement('tr');
  tr.innerHTML=`
    <td><input class="pinput" placeholder="모델명" value="${esc(model)}"></td>
    <td><input class="pinput" placeholder="제품번호" value="${esc(serial)}"></td>
    <td><input class="pinput" placeholder="불량내역" value="${esc(defect)}"></td>
    <td><button class="del-btn" onclick="this.closest('tr').remove()">🗑</button></td>`;
  tbody.appendChild(tr);
}
function getProducts(){
  return Array.from(document.querySelectorAll('#productBody tr')).map(tr=>{
    const ins=tr.querySelectorAll('input');
    return{model:ins[0]?.value||'',serial:ins[1]?.value||'',defect:ins[2]?.value||''};
  }).filter(p=>p.model||p.serial||p.defect);
}
function clearRepairForm(){
  editingRepairId=null;
  ['r_outDate','r_inDate','r_storeName','r_tel'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('r_outDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('productBody').innerHTML='';
  addProductRow();
  setRepairEditMode(false);
}
function setRepairEditMode(isEdit){
  const saveBtn=document.getElementById('repairSaveBtn');
  const cancelBtn=document.getElementById('repairCancelEditBtn');
  if(saveBtn) saveBtn.textContent=isEdit?'💾 수정 저장':'💾 저장';
  if(cancelBtn) cancelBtn.style.display=isEdit?'inline-flex':'none';
}
function cancelRepairEdit(){
  clearRepairForm();
  showToast('수정이 취소되었습니다');
}
function editRepair(id){
  const r=repairs.find(x=>x.id===id);
  if(!r){showToast('수정할 항목을 찾을 수 없습니다');return;}
  editingRepairId=id;
  document.getElementById('r_outDate').value=r.outDate||new Date().toISOString().split('T')[0];
  document.getElementById('r_inDate').value=r.inDate||'';
  document.getElementById('r_storeName').value=r.storeName||'';
  document.getElementById('r_tel').value=r.tel||'';
  document.getElementById('productBody').innerHTML='';
  (r.products&&r.products.length?r.products:[{}]).forEach(p=>addProductRow(p.model||'',p.serial||'',p.defect||''));
  setRepairEditMode(true);
  document.querySelector('#tab-repair .card')?.scrollIntoView({behavior:'smooth',block:'start'});
  showToast('수리의뢰서를 수정할 수 있습니다');
}
async function saveRepair(){
  const outDate=document.getElementById('r_outDate').value;
  const products=getProducts();
  if(!outDate){showToast('⚠️ 출고일자를 입력하세요');return;}
  if(!products.length){showToast('⚠️ 제품 정보를 입력하세요');return;}
  const prev=editingRepairId?repairs.find(r=>r.id===editingRepairId):null;
  const id=editingRepairId||'AS'+Date.now();
  const data={id,outDate,inDate:document.getElementById('r_inDate').value,
    storeName:document.getElementById('r_storeName').value.trim(),
    tel:document.getElementById('r_tel').value.trim(),products,createdAt:prev?.createdAt||Date.now()};
  try{await db.ref('repairs/'+data.id).set(data);showToast(editingRepairId?'✅ 수정 완료':'✅ 저장 완료');clearRepairForm();}
  catch(e){showToast('❌ 저장 실패: '+e.message);}
}
function renderRepairList(){
  const kw=(document.getElementById('searchKw')?.value||'').toLowerCase();
  const st=document.getElementById('filterSt')?.value||'';
  const list=document.getElementById('repairList');
  let filtered=repairs.filter(r=>{
    const mkw=!kw||(r.storeName||'').toLowerCase().includes(kw)||(r.products||[]).some(p=>(p.model||'').toLowerCase().includes(kw));
    const mst=!st||(st==='received'&&r.inDate)||(st==='pending'&&!r.inDate);
    return mkw&&mst;
  }).sort((a,b)=>b.createdAt-a.createdAt);
  if(!filtered.length){list.innerHTML='<div style="text-align:center;padding:28px;color:var(--muted);">항목이 없습니다.</div>';return;}
  list.innerHTML=filtered.map(r=>{
    const done=!!r.inDate;
    const ps=(r.products||[]).map(p=>p.model).filter(Boolean).join(', ')||'제품 미입력';
    return`<div class="repair-item ${done?'received':''}">
      <div class="ri-info">
        <div class="ri-main">${esc(r.storeName||'(가맹점 미입력)')} <span style="font-size:11px;color:var(--muted);font-weight:400;">${esc(r.tel||'')}</span></div>
        <div class="ri-sub">출고: ${r.outDate||'-'} ${r.inDate?'· 입고: '+r.inDate:''} · ${esc(ps)}</div>
      </div>
      <span class="ri-badge ${done?'done':''}">${done?'✅ 입고완료':'⏳ 입고대기'}</span>
      <div class="ri-actions">
        <button class="btn btn-outline btn-sm" onclick="editRepair('${r.id}')">✏️ 수정</button>
        ${!done?`<button class="btn btn-outline btn-sm" onclick="setInDate('${r.id}')">📥 입고</button>`:''}
        <button class="btn btn-gold btn-sm" onclick="printRepairById('${r.id}')">🖨️</button>
        <button class="btn btn-navy btn-sm" onclick="openCharge('${r.id}')">💰 청구</button>
        <button class="btn btn-red btn-sm" onclick="delRepair('${r.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}
async function setInDate(id){
  const today=new Date().toISOString().split('T')[0];
  const d=prompt('입고날짜 (YYYY-MM-DD)',today);
  if(!d)return;
  await db.ref('repairs/'+id+'/inDate').set(d);
  showToast('✅ 입고처리 완료');
}
async function delRepair(id){
  if(!confirm('삭제할까요?'))return;
  await db.ref('repairs/'+id).remove();
  showToast('🗑 삭제됨');
}

      <tr><td class="lbl">주&nbsp;&nbsp;소</td><td>부산시 남구 동명로 146번길 123 (용호동) 1층</td><td class="lbl">연락처</td><td><b>010-4551-7240</b></td></tr>

function printRepair(){
  const r={outDate:document.getElementById('r_outDate').value,inDate:document.getElementById('r_inDate').value,products:getProducts()};

function exportExcel(){
  if(!repairs.length){showToast('저장된 항목이 없습니다');return;}
  const header=['접수번호','출고일자','입고날짜','가맹점명','연락처','모델명','제품번호','불량내역'];
  const rows=[];
  repairs.forEach(r=>{
    if(r.products&&r.products.length){
      r.products.forEach((p,i)=>{rows.push([r.id,r.outDate||'',r.inDate||'',i===0?r.storeName||'':'',i===0?r.tel||'':'',p.model||'',p.serial||'',p.defect||'']);});
    }else{rows.push([r.id,r.outDate||'',r.inDate||'',r.storeName||'',r.tel||'','','','']);}
  });
  const wb=XLSX.utils.book_new(),ws=XLSX.utils.aoa_to_sheet([header,...rows]);
  XLSX.utils.book_append_sheet(wb,ws,'수리의뢰목록');
  XLSX.writeFile(wb,'수리의뢰목록_'+new Date().toLocaleDateString('ko-KR').replace(/\./g,'').replace(/ /g,'')+'.xlsx');
  showToast('📥 엑셀 저장 완료');
}

// ── Firebase 실시간 연동 ──
db.ref('repairs').on('value',snap=>{

  showToast('❌ 수리의뢰 목록 불러오기 실패: '+err.message);
});
